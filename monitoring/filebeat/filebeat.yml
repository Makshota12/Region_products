filebeat.inputs:
  - type: filestream
    id: docker-container-logs
    enabled: true
    paths:
      - /var/lib/docker/containers/*/*-json.log
    parsers:
      - ndjson:
          overwrite_keys: true
          add_error_key: true
          message_key: log

processors:
  - add_docker_metadata:
      host: "unix:///var/run/docker.sock"

output.logstash:
  hosts: ["logstash:5044"]
